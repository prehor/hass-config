---
template:
  - sensor:
      name: Solax Battery Discharge Min SOC
      unique_id: 5bc0742e-7cbe-4c36-ae8e-ca4865a4fc8d
      icon: mdi:battery-charging-low
      unit_of_measurement: '%'
      availability: >
        {{
          has_value('sensor.solax_grid_status')
          and has_value('select.solax_charger_use_mode')
        }}
      state: >
        {% if is_state('sensor.solax_grid_status', 'OffGrid') %}
          {{ states('number.solax_eps_min_soc') | int('unavailable') }}
        {% elif is_state('select.solax_charger_use_mode', 'Back Up Mode') %}
          {{ states('number.solax_backup_discharge_min_soc') | int('unavailable') }}
        {% elif is_state('sensor.solax_grid_status', 'Feedin Priority') %}
          {{ states('number.solax_feedin_discharge_min_soc') | int('unavailable') }}
        {% elif is_state('sensor.solax_grid_status', 'Self Use Mode') %}
          {{ states('number.solax_selfuse_discharge_min_soc') | int('unavailable') }}
        {% else %}
          {{ states('number.solax_backup_discharge_min_soc') | int('unavailable') }}
        {% endif %}

  - triggers:
      - trigger: numeric_state
        entity_id: sensor.solax_battery_capacity
        above: 99
      - trigger: numeric_state
        entity_id: sensor.solax_battery_capacity
        below: 100
    variables:
      last_fully_charged: >
        {{ state_attr('binary_sensor.solax_battery_fully_charged', 'last_fully_charged') | default('unknown') }}
    binary_sensor:
      - name: Solax Battery Fully Charged
        unique_id: 03d0eddc-a239-4c01-abb2-37c193316958
        icon: mdi:battery-charging-100
        availability: >
          {{ has_value('sensor.solax_battery_capacity') }}
        attributes:
          last_fully_charged: >
            {{ iif(this.state == 'on', utcnow().isoformat(), last_fully_charged) }}
        state: >
          {% set battery_capacity = states('sensor.solax_battery_capacity') | int %}
          {{ iif(battery_capacity >= 100, 'on', 'off') }}

  - triggers:
      - alias: Battery capacity step up above min soc => battery not depleted
        trigger: numeric_state
        entity_id: sensor.solax_battery_capacity
        above: sensor.solax_battery_discharge_min_soc

      - alias: Battery capacity step down to min soc => battery depleted
        trigger: numeric_state
        entity_id: sensor.solax_battery_capacity
        value_template: >
          {{ state.state | int(100) - 1 }}
        below: sensor.solax_battery_discharge_min_soc

      - alias: Min soc changed
        trigger: state
        entity_id: sensor.solax_battery_discharge_min_soc

    variables:
      previous_state: >
        {{ states('binary_sensor.solax_battery_depleted') | default('unknown') }}
      last_depleted: >
        {{ state_attr('binary_sensor.solax_battery_depleted', 'last_depleted') | default('unknown') }}

    binary_sensor:
      - name: Solax Battery Depleted
        unique_id: 9922025f-8e9c-46f4-82f7-6f33a9d49ec1
        icon: mdi:battery-charging-low
        availability: >
          {{
            has_value('sensor.solax_battery_capacity')
            and has_value('sensor.solax_battery_discharge_min_soc')
          }}
        attributes:
          last_depleted: >
            {{ iif(prev_state == 'off' and this.state == 'on', utcnow().isoformat(), last_depleted) }}
        state: >
          {% set battery_capacity = states('sensor.solax_battery_capacity') | int %}
          {% set battery_discharge_min_soc = states('sensor.solax_battery_discharge_min_soc') | int %}
          {{ iif(battery_capacity <= battery_discharge_min_soc, 'on', 'off') }}

# TODO: Notification if the battery has not been fully charged for a maximum number of days
# TODO: Notification if the battery is depleted for a maximum number of days
